<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Plugin Management</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f6f8ff;
      --muted: #cfd6e1;
      --accent: #9bff46;
      --accent-2: #4ae0ff;
      --bg: #080c14;
      --card-bg: rgba(255,255,255,0.035);
      --border: rgba(255,255,255,0.07);
      --red: #ff5a5a;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Manrope", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
    }
    * { position: relative; z-index: 1; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: transform 120ms, filter 120ms, box-shadow 120ms;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
    .btn:active { transform: translateY(0); filter: brightness(0.97); }
    .btn-google {
      background: #fff;
      color: #1f1f1f;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06101b;
      box-shadow: 0 8px 24px rgba(74,224,255,0.2);
    }
    .btn-danger {
      background: rgba(255,90,90,0.15);
      color: var(--red);
      border: 1px solid rgba(255,90,90,0.3);
      padding: 6px 14px;
      font-size: 12px;
      border-radius: 8px;
    }
    .btn-danger:hover { background: rgba(255,90,90,0.25); filter: none; transform: none; }
    .btn-sm { padding: 9px 18px; font-size: 13px; }

    /* ── Login ── */
    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 400px;
      width: 100%;
    }
    .login-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 32px rgba(74,224,255,0.25);
    }
    .login-wrap h1 { font-size: 22px; font-weight: 800; text-align: center; }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      width: 100%;
      backdrop-filter: blur(8px);
    }
    .login-card p {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Dashboard ── */
    .dashboard { max-width: 660px; width: 100%; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 660px;
      width: 100%;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar-title { font-size: 16px; font-weight: 800; }
    .topbar-right { text-align: right; }
    .topbar-email { color: var(--muted); font-size: 12px; }
    .btn-signout {
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 4px 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .btn-signout:hover { color: var(--ink); }

    /* ── Card section ── */
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-header h2 { font-size: 15px; font-weight: 700; }
    .count-badge {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── Add form ── */
    .add-form {
      display: grid;
      grid-template-columns: auto 1fr 1fr auto;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .add-form select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 150ms;
      cursor: pointer;
      appearance: none;
    }
    .add-form select:focus { border-color: rgba(74,224,255,0.5); }
    .add-form input {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 150ms;
    }
    .add-form input::placeholder { color: rgba(255,255,255,0.2); }
    .add-form input:focus { border-color: rgba(74,224,255,0.5); }

    /* ── User list ── */
    .user-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 2px; }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      transition: background 120ms;
    }
    .user-item:hover { background: rgba(255,255,255,0.03); }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(155,255,70,0.15), rgba(74,224,255,0.15));
      border: 1px solid rgba(74,224,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: var(--accent-2);
      flex-shrink: 0;
    }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-cid { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 24px 0;
      opacity: 0.6;
    }
    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .auth-vatsim { background: rgba(41,180,115,0.15); color: #29b473; border: 1px solid rgba(41,180,115,0.3); }
    .auth-discord { background: rgba(88,101,242,0.15); color: #8b9aff; border: 1px solid rgba(88,101,242,0.3); }

    .user-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .btn-edit {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 120ms, color 120ms;
    }
    .btn-edit:hover { background: rgba(255,255,255,0.1); color: var(--ink); }
    .user-actions { display: flex; gap: 6px; }

    /* ── Edit Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: #0f1520;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
    }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; margin-top: 14px; }
    .modal label:first-of-type { margin-top: 0; }
    .modal input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    .modal input:focus { border-color: rgba(74,224,255,0.5); }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .modal-actions .btn { flex: 1; }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Banners ── */
    .banner {
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      text-align: center;
      max-width: 660px;
      width: 100%;
    }
    .banner-error { background: rgba(255,90,90,0.12); border: 1px solid rgba(255,90,90,0.3); color: var(--red); }

    @media (max-width: 540px) {
      .add-form { grid-template-columns: 1fr 1fr; }
      .add-form .btn { grid-column: 1 / -1; }
    }
    @media (max-width: 380px) {
      .add-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Login view -->
  <div id="login-view" style="display:none" class="login-wrap">
    <div class="login-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#06101b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>Plugin Admin</h1>
    <div class="login-card">
      <p>Sign in with your Google account to manage who can upload plugins to the vatSys Plugin Installer.</p>
      <a class="btn btn-google" href="https://api.actuallyleviticus.xyz/auth/google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </a>
    </div>
  </div>

  <!-- Dashboard view -->
  <div id="dashboard-view" style="display:none" class="dashboard">
    <div class="topbar">
      <div class="topbar-logo">
        <div class="topbar-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06101b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span class="topbar-title">Plugin Admin</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-email" id="admin-email"></div>
        <button class="btn-signout" onclick="logout()">Sign out</button>
      </div>
    </div>

    <div id="error-banner" class="banner banner-error" style="display:none"></div>

    <!-- Allowed Users -->
    <div class="section">
      <div class="section-header">
        <h2>Allowed Uploaders</h2>
        <span class="count-badge" id="user-count">–</span>
      </div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="Display name">
        <input type="text" id="new-vatsim" placeholder="VATSIM CID (optional)" inputmode="numeric">
        <input type="text" id="new-discord" placeholder="Discord ID (optional)" inputmode="numeric">
        <button class="btn btn-accent btn-sm" onclick="addUser()">Add</button>
      </div>
      <ul class="user-list" id="user-list">
        <li class="empty">Loading…</li>
      </ul>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Edit User</h3>
      <input type="hidden" id="edit-user-id">
      <label>Display Name</label>
      <input type="text" id="edit-name">
      <label>VATSIM CID</label>
      <input type="text" id="edit-vatsim" placeholder="Leave empty to unlink" inputmode="numeric">
      <label>Discord ID</label>
      <input type="text" id="edit-discord" placeholder="Leave empty to unlink" inputmode="numeric">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="saveUserEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.actuallyleviticus.xyz";
    let token = null;

    function isTokenValid(t) {
      try {
        const payload = JSON.parse(atob(t));
        const data = JSON.parse(payload.data);
        return data.exp && Date.now() < data.exp;
      } catch { return false; }
    }

    function init() {
      const hash = window.location.hash;
      if (hash.startsWith("#token=")) {
        token = hash.slice(7);
        localStorage.setItem("adminToken", token);
        history.replaceState(null, "", window.location.pathname);
      } else if (hash.startsWith("#error=")) {
        showError(decodeURIComponent(hash.slice(7)));
        history.replaceState(null, "", window.location.pathname);
      }

      if (!token) token = localStorage.getItem("adminToken");

      if (token && !isTokenValid(token)) {
        localStorage.removeItem("adminToken");
        token = null;
      }

      if (token) {
        try {
          const payload = JSON.parse(atob(token));
          const data = JSON.parse(payload.data);
          document.getElementById("admin-email").textContent = data.email;
        } catch {}
        document.getElementById("dashboard-view").style.display = "block";
        loadUsers();
      } else {
        document.getElementById("login-view").style.display = "block";
      }
    }

    function logout() {
      localStorage.removeItem("adminToken");
      token = null;
      document.getElementById("dashboard-view").style.display = "none";
      document.getElementById("login-view").style.display = "block";
    }

    function showError(msg) {
      const banner = document.getElementById("error-banner");
      banner.textContent = msg;
      banner.style.display = "block";
      setTimeout(() => banner.style.display = "none", 5000);
    }

    async function apiCall(method, path, body) {
      const opts = {
        method,
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API}${path}`, opts);
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) { logout(); showError("Session expired"); }
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    async function loadUsers() {
      try {
        const data = await apiCall("GET", "/admin/users");
        const list = document.getElementById("user-list");
        document.getElementById("user-count").textContent = data.users.length;
        if (!data.users.length) {
          list.innerHTML = '<li class="empty">No authorized uploaders yet. Add one above.</li>';
          return;
        }
        list.innerHTML = data.users.map(u => {
          const badges = [];
          if (u.vatsim_cid) badges.push('<span class="auth-badge auth-vatsim">VATSIM</span>');
          if (u.discord_id) badges.push('<span class="auth-badge auth-discord">Discord</span>');

          const ids = [];
          if (u.vatsim_cid) ids.push('CID ' + escapeHtml(u.vatsim_cid));
          if (u.discord_id) ids.push('Discord ' + escapeHtml(u.discord_id));

          const avatarHtml = u.avatar_url
            ? `<img src="${escapeHtml(u.avatar_url)}" alt="">`
            : escapeHtml((u.vatsim_cid || u.discord_id || "??").slice(-2));

          return `
          <li class="user-item">
            <div class="user-info">
              <div class="user-avatar">${avatarHtml}</div>
              <div>
                <div class="user-name">${escapeHtml(u.name)} ${badges.join(" ")}</div>
                <div class="user-cid">${ids.join(" · ")}</div>
              </div>
            </div>
            <div class="user-actions">
              <button class="btn-edit" onclick="openEditModal(${u.id},'${escapeAttr(u.name)}','${escapeAttr(u.vatsim_cid||"")}','${escapeAttr(u.discord_id||"")}')">Edit</button>
              <button class="btn btn-danger" onclick="removeUser(${u.id},'${escapeAttr(u.name)}')">Remove</button>
            </div>
          </li>`;
        }).join("");
      } catch (err) {
        showError(err.message);
      }
    }

    async function addUser() {
      const name = document.getElementById("new-name").value.trim();
      const vatsimCid = document.getElementById("new-vatsim").value.trim();
      const discordId = document.getElementById("new-discord").value.trim();
      if (!name) { showError("Name is required"); return; }
      if (!vatsimCid && !discordId) { showError("At least one ID is required"); return; }
      if (vatsimCid && !/^\d+$/.test(vatsimCid)) { showError("VATSIM CID must be numeric"); return; }
      if (discordId && !/^\d+$/.test(discordId)) { showError("Discord ID must be numeric"); return; }
      try {
        await apiCall("POST", "/admin/users", { name, vatsimCid: vatsimCid || null, discordId: discordId || null });
        document.getElementById("new-name").value = "";
        document.getElementById("new-vatsim").value = "";
        document.getElementById("new-discord").value = "";
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    function openEditModal(id, name, vatsimCid, discordId) {
      document.getElementById("edit-user-id").value = id;
      document.getElementById("edit-name").value = name;
      document.getElementById("edit-vatsim").value = vatsimCid;
      document.getElementById("edit-discord").value = discordId;
      document.getElementById("edit-modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("edit-modal").style.display = "none";
    }

    async function saveUserEdit() {
      const id = parseInt(document.getElementById("edit-user-id").value);
      const name = document.getElementById("edit-name").value.trim();
      const vatsimCid = document.getElementById("edit-vatsim").value.trim();
      const discordId = document.getElementById("edit-discord").value.trim();
      if (!name) { showError("Name is required"); return; }
      if (vatsimCid && !/^\d+$/.test(vatsimCid)) { showError("VATSIM CID must be numeric"); return; }
      if (discordId && !/^\d+$/.test(discordId)) { showError("Discord ID must be numeric"); return; }
      try {
        await apiCall("PUT", "/admin/users", { id, name, vatsimCid: vatsimCid || "", discordId: discordId || "" });
        closeModal();
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    async function removeUser(id, name) {
      if (!confirm(`Remove uploader "${name}"?`)) return;
      try {
        await apiCall("DELETE", "/admin/users", { id });
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return String(str || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;");
    }

    init();
  </script>
</body>
</html>
