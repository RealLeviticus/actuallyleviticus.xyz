<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Plugin Management</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f6f8ff;
      --muted: #cfd6e1;
      --accent: #9bff46;
      --accent-2: #4ae0ff;
      --bg: #0a0e17;
      --card-bg: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --red: #ff5a5a;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Manrope", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .login-card p {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 14px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: transform 100ms, filter 100ms;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active { transform: translateY(0); }
    .btn-google {
      background: #fff;
      color: #333;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06101b;
    }
    .btn-red {
      background: var(--red);
      color: #fff;
      padding: 6px 14px;
      font-size: 12px;
    }
    .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
    }

    /* Dashboard */
    .dashboard {
      max-width: 640px;
      width: 100%;
    }
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .add-form input {
      flex: 1;
      min-width: 100px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    .add-form input::placeholder { color: rgba(255,255,255,0.25); }
    .add-form input:focus { border-color: var(--accent-2); }
    .user-list {
      list-style: none;
      padding: 0;
    }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .user-item:last-child { border-bottom: none; }
    .user-cid {
      color: var(--accent-2);
      font-weight: 600;
      margin-right: 10px;
      font-variant-numeric: tabular-nums;
    }
    .user-name { color: var(--muted); }
    .empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }
    .error-banner {
      background: rgba(255,90,90,0.15);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      text-align: center;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 640px;
      width: 100%;
      margin-bottom: 24px;
    }
    .topbar-user {
      color: var(--muted);
      font-size: 13px;
    }
    .logout-link {
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
    }

    @media (max-width: 500px) {
      .add-form { flex-direction: column; }
      .add-form input { min-width: unset; }
    }
  </style>
</head>
<body>

  <!-- Login view -->
  <div id="login-view" style="display:none">
    <h1>Admin Panel</h1>
    <p class="subtitle">Plugin upload management</p>
    <div class="login-card">
      <p>Sign in with your Google account to manage authorized uploaders.</p>
      <a class="btn btn-google" href="https://api.actuallyleviticus.xyz/auth/google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </a>
    </div>
  </div>

  <!-- Dashboard view -->
  <div id="dashboard-view" style="display:none" class="dashboard">
    <div class="topbar">
      <div>
        <h1>Admin Panel</h1>
      </div>
      <div style="text-align:right">
        <span class="topbar-user" id="admin-email"></span><br>
        <button class="logout-link" onclick="logout()">Sign out</button>
      </div>
    </div>

    <div id="error-banner" class="error-banner" style="display:none"></div>

    <!-- Allowed Users -->
    <div class="section">
      <h2>Allowed Uploaders</h2>
      <div class="add-form">
        <input type="text" id="new-cid" placeholder="VATSIM CID" inputmode="numeric">
        <input type="text" id="new-name" placeholder="Display name">
        <button class="btn btn-accent btn-sm" onclick="addUser()">Add</button>
      </div>
      <ul class="user-list" id="user-list">
        <li class="empty">Loading…</li>
      </ul>
    </div>
  </div>

  <script>
    const API = "https://api.actuallyleviticus.xyz";
    let token = null;

    function init() {
      // Check for token in hash
      const hash = window.location.hash;
      if (hash.startsWith("#token=")) {
        token = hash.slice(7);
        sessionStorage.setItem("adminToken", token);
        history.replaceState(null, "", window.location.pathname);
      } else if (hash.startsWith("#error=")) {
        showError(decodeURIComponent(hash.slice(7)));
        history.replaceState(null, "", window.location.pathname);
      }

      // Check sessionStorage
      if (!token) token = sessionStorage.getItem("adminToken");

      if (token) {
        // Decode token to show email
        try {
          const payload = JSON.parse(atob(token));
          const data = JSON.parse(payload.data);
          document.getElementById("admin-email").textContent = data.email;
        } catch {}
        document.getElementById("dashboard-view").style.display = "block";
        loadUsers();
      } else {
        document.getElementById("login-view").style.display = "block";
      }
    }

    function logout() {
      sessionStorage.removeItem("adminToken");
      token = null;
      document.getElementById("dashboard-view").style.display = "none";
      document.getElementById("login-view").style.display = "block";
    }

    function showError(msg) {
      const banner = document.getElementById("error-banner");
      banner.textContent = msg;
      banner.style.display = "block";
      setTimeout(() => banner.style.display = "none", 5000);
    }

    async function apiCall(method, path, body) {
      const opts = {
        method,
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API}${path}`, opts);
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) { logout(); showError("Session expired"); }
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    async function loadUsers() {
      try {
        const data = await apiCall("GET", "/admin/users");
        const list = document.getElementById("user-list");
        if (!data.users.length) {
          list.innerHTML = '<li class="empty">No authorized uploaders yet. Add one above.</li>';
          return;
        }
        list.innerHTML = data.users.map(u => `
          <li class="user-item">
            <div><span class="user-cid">${escapeHtml(u.vatsim_cid)}</span> <span class="user-name">${escapeHtml(u.name)}</span></div>
            <button class="btn btn-red" onclick="removeUser('${escapeHtml(u.vatsim_cid)}')">Remove</button>
          </li>
        `).join("");
      } catch (err) {
        showError(err.message);
      }
    }

    async function addUser() {
      const cid = document.getElementById("new-cid").value.trim();
      const name = document.getElementById("new-name").value.trim();
      if (!cid || !name) { showError("Both CID and name are required"); return; }
      if (!/^\d+$/.test(cid)) { showError("CID must be numeric"); return; }
      try {
        await apiCall("POST", "/admin/users", { cid, name });
        document.getElementById("new-cid").value = "";
        document.getElementById("new-name").value = "";
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    async function removeUser(cid) {
      if (!confirm(`Remove uploader ${cid}?`)) return;
      try {
        await apiCall("DELETE", "/admin/users", { cid });
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
