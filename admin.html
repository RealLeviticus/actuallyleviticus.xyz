<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Plugin Management</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f1fbff;
      --muted: #9fb4bf;
      --accent: #6ff2b0;
      --accent-2: #53c8ff;
      --bg: #071015;
      --panel: rgba(12, 27, 35, 0.78);
      --panel-soft: rgba(16, 36, 46, 0.68);
      --border: rgba(132, 190, 215, 0.22);
      --shadow: 0 28px 58px rgba(1, 8, 12, 0.42);
      --danger: #ff7f7f;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      background:
        radial-gradient(circle at 15% 8%, rgba(111, 242, 176, 0.16), transparent 32%),
        radial-gradient(circle at 85% 0%, rgba(83, 200, 255, 0.14), transparent 28%),
        linear-gradient(180deg, #071015, #03070b 58%, #020508);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 56px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(111, 242, 176, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(83, 200, 255, 0.035) 1px, transparent 1px);
      background-size: 160px 160px;
      mask-image: radial-gradient(circle at 50% -20%, rgba(0, 0, 0, 0.9), transparent 75%);
      z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 70% 80%, rgba(111, 242, 176, 0.08), transparent 42%);
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease, border-color 140ms ease;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active { transform: translateY(0); filter: brightness(0.98); }
    .btn-google {
      background: #ffffff;
      color: #18232a;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.34);
    }
    .btn-accent {
      background: linear-gradient(130deg, var(--accent), var(--accent-2));
      color: #05242d;
      box-shadow: 0 12px 28px rgba(83, 200, 255, 0.24);
    }
    .btn-danger {
      background: rgba(255, 127, 127, 0.14);
      color: var(--danger);
      border-color: rgba(255, 127, 127, 0.34);
      padding: 8px 13px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-danger:hover { background: rgba(255, 127, 127, 0.22); }
    .btn-sm { padding: 11px 16px; font-size: 13px; }

    .login-wrap {
      width: min(560px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: min(9vh, 72px);
    }
    .login-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 34px rgba(83, 200, 255, 0.24);
    }
    .login-wrap h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(30px, 3.2vw, 36px);
      letter-spacing: -0.04em;
      text-align: center;
    }
    .login-card {
      width: 100%;
      background: linear-gradient(180deg, var(--panel), var(--panel-soft));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 34px;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .login-card p {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.75;
    }

    .dashboard {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(12, 27, 35, 0.88), rgba(8, 20, 27, 0.82));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(83, 200, 255, 0.22);
    }
    .topbar-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      letter-spacing: -0.03em;
    }
    .topbar-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      text-align: right;
    }
    .topbar-email {
      color: var(--muted);
      font-size: 12px;
    }
    .btn-signout {
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .btn-signout:hover { color: var(--ink); }

    .section {
      background: linear-gradient(180deg, var(--panel), var(--panel-soft));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      min-height: clamp(420px, 65vh, 760px);
      display: flex;
      flex-direction: column;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .section-header h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 2.2vw, 28px);
      letter-spacing: -0.03em;
    }
    .count-badge {
      background: rgba(83, 200, 255, 0.08);
      border: 1px solid rgba(83, 200, 255, 0.28);
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 12px;
      color: #b3eaff;
      font-weight: 700;
      line-height: 1;
    }

    .add-form {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(132, 190, 215, 0.18);
    }
    .add-form input {
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(6, 16, 23, 0.72);
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }
    .add-form input::placeholder { color: rgba(159, 180, 191, 0.72); }
    .add-form input:focus {
      border-color: rgba(83, 200, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(83, 200, 255, 0.12);
    }

    .user-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 10px;
      align-content: start;
      overflow-y: auto;
      flex: 1;
      padding-right: 4px;
    }
    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(132, 190, 215, 0.16);
      background: rgba(7, 18, 24, 0.7);
      transition: border-color 140ms ease, background 140ms ease, transform 140ms ease;
    }
    .user-item:hover {
      border-color: rgba(83, 200, 255, 0.34);
      background: rgba(10, 23, 31, 0.82);
      transform: translateY(-1px);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(111, 242, 176, 0.22), rgba(83, 200, 255, 0.22));
      border: 1px solid rgba(111, 242, 176, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #b7ffde;
      flex-shrink: 0;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }
    .user-name {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .user-cid {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      margin-top: 3px;
      line-height: 1.35;
      word-break: break-word;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 30px 0;
      opacity: 0.72;
    }
    .auth-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .auth-vatsim {
      background: rgba(111, 242, 176, 0.17);
      color: #8dffcc;
      border: 1px solid rgba(111, 242, 176, 0.34);
    }
    .auth-discord {
      background: rgba(104, 139, 255, 0.18);
      color: #bdcbff;
      border: 1px solid rgba(121, 152, 255, 0.36);
    }
    .user-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-edit {
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      border: 1px solid rgba(132, 190, 215, 0.2);
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
    }
    .btn-edit:hover {
      border-color: rgba(83, 200, 255, 0.36);
      background: rgba(83, 200, 255, 0.12);
      color: var(--ink);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(1, 7, 12, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(6px);
      padding: 20px;
    }
    .modal {
      background: linear-gradient(180deg, rgba(12, 27, 35, 0.94), rgba(9, 21, 29, 0.92));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 26px;
      max-width: 440px;
      width: min(100%, 440px);
      box-shadow: var(--shadow);
    }
    .modal h3 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 24px;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .modal label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    .modal label:first-of-type { margin-top: 0; }
    .modal input {
      width: 100%;
      padding: 11px 13px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: rgba(6, 16, 23, 0.72);
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    .modal input:focus {
      border-color: rgba(83, 200, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(83, 200, 255, 0.12);
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .modal-actions .btn { flex: 1; }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      border-color: rgba(132, 190, 215, 0.18);
    }

    .banner {
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      text-align: center;
      width: 100%;
      margin: 0;
    }
    .banner-error {
      background: rgba(255, 127, 127, 0.14);
      border: 1px solid rgba(255, 127, 127, 0.34);
      color: var(--danger);
    }

    @media (max-width: 920px) {
      body { padding: 24px 16px 44px; }
      .section { min-height: auto; }
      .add-form { grid-template-columns: 1fr 1fr; }
      .add-form .btn { grid-column: 1 / -1; }
      .user-list { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .login-wrap { margin-top: 26px; gap: 18px; }
      .login-card { padding: 24px; }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .topbar-right { align-items: flex-start; text-align: left; }
      .section { padding: 18px; border-radius: 20px; }
      .add-form { grid-template-columns: 1fr; }
      .user-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .user-actions { width: 100%; }
      .user-actions > * { flex: 1; }
    }
  </style>
</head>
<body>

  <!-- Login view -->
  <div id="login-view" style="display:none" class="login-wrap">
    <div class="login-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#06101b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>Plugin Admin</h1>
    <div class="login-card">
      <p>Sign in with your Google account to manage who can upload plugins to the vatSys Plugin Installer.</p>
      <a class="btn btn-google" href="https://api.actuallyleviticus.xyz/auth/google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </a>
    </div>
  </div>

  <!-- Dashboard view -->
  <div id="dashboard-view" style="display:none" class="dashboard">
    <div class="topbar">
      <div class="topbar-logo">
        <div class="topbar-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06101b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span class="topbar-title">Plugin Admin</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-email" id="admin-email"></div>
        <button class="btn-signout" onclick="logout()">Sign out</button>
      </div>
    </div>

    <div id="error-banner" class="banner banner-error" style="display:none"></div>

    <!-- Allowed Users -->
    <div class="section">
      <div class="section-header">
        <h2>Allowed Uploaders</h2>
        <span class="count-badge" id="user-count">–</span>
      </div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="Display name">
        <input type="text" id="new-vatsim" placeholder="VATSIM CID (optional)" inputmode="numeric">
        <input type="text" id="new-discord" placeholder="Discord ID (optional)" inputmode="numeric">
        <button class="btn btn-accent btn-sm" onclick="addUser()">Add</button>
      </div>
      <ul class="user-list" id="user-list">
        <li class="empty">Loading…</li>
      </ul>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Edit User</h3>
      <input type="hidden" id="edit-user-id">
      <label>Display Name</label>
      <input type="text" id="edit-name">
      <label>VATSIM CID</label>
      <input type="text" id="edit-vatsim" placeholder="Leave empty to unlink" inputmode="numeric">
      <label>Discord ID</label>
      <input type="text" id="edit-discord" placeholder="Leave empty to unlink" inputmode="numeric">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" onclick="saveUserEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.actuallyleviticus.xyz";
    let token = null;

    function isTokenValid(t) {
      try {
        const payload = JSON.parse(atob(t));
        const data = JSON.parse(payload.data);
        return data.exp && Date.now() < data.exp;
      } catch { return false; }
    }

    function init() {
      const hash = window.location.hash;
      if (hash.startsWith("#token=")) {
        token = hash.slice(7);
        localStorage.setItem("adminToken", token);
        history.replaceState(null, "", window.location.pathname);
      } else if (hash.startsWith("#error=")) {
        showError(decodeURIComponent(hash.slice(7)));
        history.replaceState(null, "", window.location.pathname);
      }

      if (!token) token = localStorage.getItem("adminToken");

      if (token && !isTokenValid(token)) {
        localStorage.removeItem("adminToken");
        token = null;
      }

      if (token) {
        try {
          const payload = JSON.parse(atob(token));
          const data = JSON.parse(payload.data);
          document.getElementById("admin-email").textContent = data.email;
        } catch {}
        document.getElementById("dashboard-view").style.display = "block";
        loadUsers();
      } else {
        document.getElementById("login-view").style.display = "block";
      }
    }

    function logout() {
      localStorage.removeItem("adminToken");
      token = null;
      document.getElementById("dashboard-view").style.display = "none";
      document.getElementById("login-view").style.display = "block";
    }

    function showError(msg) {
      const banner = document.getElementById("error-banner");
      banner.textContent = msg;
      banner.style.display = "block";
      setTimeout(() => banner.style.display = "none", 5000);
    }

    async function apiCall(method, path, body) {
      const opts = {
        method,
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API}${path}`, opts);
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) { logout(); showError("Session expired"); }
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    async function loadUsers() {
      try {
        const data = await apiCall("GET", "/admin/users");
        const list = document.getElementById("user-list");
        document.getElementById("user-count").textContent = data.users.length;
        if (!data.users.length) {
          list.innerHTML = '<li class="empty">No authorized uploaders yet. Add one above.</li>';
          return;
        }
        list.innerHTML = data.users.map(u => {
          const badges = [];
          if (u.vatsim_cid) badges.push('<span class="auth-badge auth-vatsim">VATSIM</span>');
          if (u.discord_id) badges.push('<span class="auth-badge auth-discord">Discord</span>');

          const ids = [];
          if (u.vatsim_cid) ids.push('CID ' + escapeHtml(u.vatsim_cid));
          if (u.discord_id) ids.push('Discord ' + escapeHtml(u.discord_id));

          const fallbackChars = String(u.name || u.vatsim_cid || u.discord_id || "??")
            .match(/[A-Za-z0-9]/g);
          const avatarFallback = (fallbackChars ? fallbackChars.join("") : "??")
            .slice(0, 2)
            .toUpperCase()
            .padEnd(2, "?");
          const avatarHtml = u.avatar_url
            ? `<img src="${escapeHtml(u.avatar_url)}" alt="${escapeAttr(u.name)}" loading="lazy" onerror="this.onerror=null;this.remove();this.parentNode.textContent='${escapeAttr(avatarFallback)}';">`
            : escapeHtml(avatarFallback);

          return `
          <li class="user-item">
            <div class="user-info">
              <div class="user-avatar">${avatarHtml}</div>
              <div>
                <div class="user-name">${escapeHtml(u.name)} ${badges.join(" ")}</div>
                <div class="user-cid">${ids.join(" · ")}</div>
              </div>
            </div>
            <div class="user-actions">
              <button class="btn-edit" onclick="openEditModal(${u.id},'${escapeAttr(u.name)}','${escapeAttr(u.vatsim_cid||"")}','${escapeAttr(u.discord_id||"")}')">Edit</button>
              <button class="btn btn-danger" onclick="removeUser(${u.id},'${escapeAttr(u.name)}')">Remove</button>
            </div>
          </li>`;
        }).join("");
      } catch (err) {
        showError(err.message);
      }
    }

    async function addUser() {
      const name = document.getElementById("new-name").value.trim();
      const vatsimCid = document.getElementById("new-vatsim").value.trim();
      const discordId = document.getElementById("new-discord").value.trim();
      if (!name) { showError("Name is required"); return; }
      if (!vatsimCid && !discordId) { showError("At least one ID is required"); return; }
      if (vatsimCid && !/^\d+$/.test(vatsimCid)) { showError("VATSIM CID must be numeric"); return; }
      if (discordId && !/^\d+$/.test(discordId)) { showError("Discord ID must be numeric"); return; }
      try {
        await apiCall("POST", "/admin/users", { name, vatsimCid: vatsimCid || null, discordId: discordId || null });
        document.getElementById("new-name").value = "";
        document.getElementById("new-vatsim").value = "";
        document.getElementById("new-discord").value = "";
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    function openEditModal(id, name, vatsimCid, discordId) {
      document.getElementById("edit-user-id").value = id;
      document.getElementById("edit-name").value = name;
      document.getElementById("edit-vatsim").value = vatsimCid;
      document.getElementById("edit-discord").value = discordId;
      document.getElementById("edit-modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("edit-modal").style.display = "none";
    }

    async function saveUserEdit() {
      const id = parseInt(document.getElementById("edit-user-id").value);
      const name = document.getElementById("edit-name").value.trim();
      const vatsimCid = document.getElementById("edit-vatsim").value.trim();
      const discordId = document.getElementById("edit-discord").value.trim();
      if (!name) { showError("Name is required"); return; }
      if (vatsimCid && !/^\d+$/.test(vatsimCid)) { showError("VATSIM CID must be numeric"); return; }
      if (discordId && !/^\d+$/.test(discordId)) { showError("Discord ID must be numeric"); return; }
      try {
        await apiCall("PUT", "/admin/users", { id, name, vatsimCid: vatsimCid || "", discordId: discordId || "" });
        closeModal();
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    async function removeUser(id, name) {
      if (!confirm(`Remove uploader "${name}"?`)) return;
      try {
        await apiCall("DELETE", "/admin/users", { id });
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return String(str || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;");
    }

    init();
  </script>
</body>
</html>
