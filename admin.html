<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Plugin Management</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f4f4;
      --surface: #ffffff;
      --surface-soft: #f8fbfa;
      --text: #194559;
      --muted: #5f7684;
      --line: #d8e1e6;
      --brand: #88b597;
      --brand-strong: #6ea37f;
      --brand-wash: #eef6f1;
      --danger: #b94747;
      --danger-wash: #fff1f1;
      --radius-lg: 20px;
      --radius-md: 14px;
      --shadow: 0 14px 36px rgba(25, 69, 89, 0.08);
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(180deg, #f8faf9 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 18px 40px;
    }

    .page {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-google {
      background: var(--surface);
      color: var(--text);
      border-color: var(--line);
      box-shadow: var(--shadow);
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .btn-primary:hover { background: var(--brand-strong); border-color: var(--brand-strong); }

    .btn-danger {
      background: var(--danger-wash);
      color: var(--danger);
      border-color: #f2cbcb;
      padding: 8px 12px;
      font-size: 12px;
    }

    .btn-secondary {
      background: #fff;
      color: var(--muted);
      border-color: var(--line);
    }

    .btn-secondary:hover { color: var(--text); }

    .banner {
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 14px;
      font-size: 13px;
      border: 1px solid transparent;
    }

    .banner-error {
      background: var(--danger-wash);
      color: var(--danger);
      border-color: #f2cbcb;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .login-wrap {
      width: min(560px, 100%);
      margin: 8vh auto 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .login-icon {
      width: 62px;
      height: 62px;
      border-radius: 16px;
      background: var(--brand-wash);
      border: 1px solid #d7e7dd;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand-strong);
    }

    .login-wrap h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(28px, 4vw, 36px);
      letter-spacing: -0.03em;
    }

    .login-wrap p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .login-card {
      width: 100%;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--brand-wash);
      border: 1px solid #d7e7dd;
      color: var(--brand-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .topbar-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .topbar-email {
      color: var(--muted);
      font-size: 12px;
    }

    .btn-signout {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      padding: 0;
    }

    .btn-signout:hover { color: var(--text); }

    .main-card {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 70vh;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .section-head h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(24px, 2.8vw, 30px);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .section-hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    .count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--brand-wash);
      border: 1px solid #d7e7dd;
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 700;
    }

    .add-form {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr auto;
      gap: 10px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    .input::placeholder { color: #8ea0aa; }

    .input:focus {
      border-color: #9fbeab;
      box-shadow: 0 0 0 3px rgba(136, 181, 151, 0.2);
    }

    .user-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;
      align-content: start;
      overflow-y: auto;
      flex: 1;
      padding-right: 2px;
    }

    .user-item {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: border-color 140ms ease, transform 140ms ease;
    }

    .user-item:hover {
      border-color: #a9c6b3;
      transform: translateY(-1px);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .user-avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid #d7e7dd;
      background: var(--brand-wash);
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .user-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .user-cid {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }

    .auth-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .auth-vatsim {
      background: #edf7f0;
      border-color: #d5eadc;
      color: #467b5b;
    }

    .auth-discord {
      background: #eef1ff;
      border-color: #d9e0ff;
      color: #4e5fb3;
    }

    .user-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-edit {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-edit:hover {
      border-color: #a9c6b3;
      color: var(--text);
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 28px 18px;
      border: 1px dashed var(--line);
      border-radius: var(--radius-md);
      background: #fcfdfd;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(16, 41, 53, 0.28);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      width: min(460px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .modal h3 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 24px;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    .modal label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 12px 0 6px;
    }

    .modal label:first-of-type { margin-top: 0; }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }

    .modal-actions .btn { flex: 1; }

    @media (max-width: 900px) {
      .add-form {
        grid-template-columns: 1fr 1fr;
      }

      .add-form .btn {
        grid-column: 1 / -1;
      }

      .user-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body { padding: 14px 12px 26px; }

      .login-wrap {
        margin-top: 26px;
      }

      .login-card {
        padding: 20px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .topbar-right {
        align-items: flex-start;
      }

      .main-card {
        padding: 14px;
      }

      .add-form {
        grid-template-columns: 1fr;
      }

      .user-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .user-actions {
        width: 100%;
      }

      .user-actions > * {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="login-view" style="display:none" class="login-wrap">
      <div class="login-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1>Plugin Admin</h1>
      <p>Manage who can upload plugins for the vatSys installer.</p>
      <div class="card login-card">
        <a class="btn btn-google" href="https://api.actuallyleviticus.xyz/auth/google">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign in with Google
        </a>
      </div>
    </div>

    <div id="dashboard-view" style="display:none" class="dashboard">
      <div class="card topbar">
        <div class="brand">
          <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div>
            <div class="brand-title">Plugin Admin</div>
            <div class="brand-sub">Uploader access control</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-email" id="admin-email"></div>
          <button class="btn-signout" onclick="logout()">Sign out</button>
        </div>
      </div>

      <div id="error-banner" class="banner banner-error" style="display:none"></div>

      <div class="card main-card">
        <div class="section-head">
          <div>
            <h2>Allowed Uploaders</h2>
            <div class="section-hint">Add or edit uploaders using VATSIM CID and/or Discord ID.</div>
          </div>
          <span class="count" id="user-count">-</span>
        </div>

        <div class="add-form">
          <input class="input" type="text" id="new-name" placeholder="Display name">
          <input class="input" type="text" id="new-vatsim" placeholder="VATSIM CID (optional)" inputmode="numeric">
          <input class="input" type="text" id="new-discord" placeholder="Discord ID (optional)" inputmode="numeric">
          <button class="btn btn-primary" onclick="addUser()">Add Uploader</button>
        </div>

        <ul class="user-list" id="user-list">
          <li class="empty">Loading...</li>
        </ul>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Edit User</h3>
      <input type="hidden" id="edit-user-id">
      <label>Display Name</label>
      <input class="input" type="text" id="edit-name">
      <label>VATSIM CID</label>
      <input class="input" type="text" id="edit-vatsim" placeholder="Leave empty to unlink" inputmode="numeric">
      <label>Discord ID</label>
      <input class="input" type="text" id="edit-discord" placeholder="Leave empty to unlink" inputmode="numeric">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveUserEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.actuallyleviticus.xyz";
    let token = null;

    function isTokenValid(t) {
      try {
        const payload = JSON.parse(atob(t));
        const data = JSON.parse(payload.data);
        return data.exp && Date.now() < data.exp;
      } catch { return false; }
    }

    function init() {
      const hash = window.location.hash;
      if (hash.startsWith("#token=")) {
        token = hash.slice(7);
        localStorage.setItem("adminToken", token);
        history.replaceState(null, "", window.location.pathname);
      } else if (hash.startsWith("#error=")) {
        showError(decodeURIComponent(hash.slice(7)));
        history.replaceState(null, "", window.location.pathname);
      }

      if (!token) token = localStorage.getItem("adminToken");

      if (token && !isTokenValid(token)) {
        localStorage.removeItem("adminToken");
        token = null;
      }

      if (token) {
        try {
          const payload = JSON.parse(atob(token));
          const data = JSON.parse(payload.data);
          document.getElementById("admin-email").textContent = data.email;
        } catch {}
        document.getElementById("dashboard-view").style.display = "flex";
        loadUsers();
      } else {
        document.getElementById("login-view").style.display = "flex";
      }
    }

    function logout() {
      localStorage.removeItem("adminToken");
      token = null;
      document.getElementById("dashboard-view").style.display = "none";
      document.getElementById("login-view").style.display = "flex";
    }

    function showError(msg) {
      const banner = document.getElementById("error-banner");
      banner.textContent = msg;
      banner.style.display = "block";
      setTimeout(() => banner.style.display = "none", 5000);
    }

    async function apiCall(method, path, body) {
      const opts = {
        method,
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API}${path}`, opts);
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) { logout(); showError("Session expired"); }
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    async function loadUsers() {
      try {
        const data = await apiCall("GET", "/admin/users");
        const list = document.getElementById("user-list");
        document.getElementById("user-count").textContent = data.users.length;
        if (!data.users.length) {
          list.innerHTML = '<li class="empty">No authorized uploaders yet. Add one above.</li>';
          return;
        }
        list.innerHTML = data.users.map(u => {
          const badges = [];
          if (u.vatsim_cid) badges.push('<span class="auth-badge auth-vatsim">VATSIM</span>');
          if (u.discord_id) badges.push('<span class="auth-badge auth-discord">Discord</span>');

          const ids = [];
          if (u.vatsim_cid) ids.push('CID ' + escapeHtml(u.vatsim_cid));
          if (u.discord_id) ids.push('Discord ' + escapeHtml(u.discord_id));

          const fallbackChars = String(u.name || u.vatsim_cid || u.discord_id || "??")
            .match(/[A-Za-z0-9]/g);
          const avatarFallback = (fallbackChars ? fallbackChars.join("") : "??")
            .slice(0, 2)
            .toUpperCase()
            .padEnd(2, "?");
          const avatarHtml = u.avatar_url
            ? `<img src="${escapeHtml(u.avatar_url)}" alt="${escapeAttr(u.name)}" loading="lazy" onerror="this.onerror=null;this.remove();this.parentNode.textContent='${escapeAttr(avatarFallback)}';">`
            : escapeHtml(avatarFallback);

          return `
          <li class="user-item">
            <div class="user-info">
              <div class="user-avatar">${avatarHtml}</div>
              <div>
                <div class="user-name">${escapeHtml(u.name)} ${badges.join(" ")}</div>
                <div class="user-cid">${ids.join(" · ")}</div>
              </div>
            </div>
            <div class="user-actions">
              <button class="btn-edit" onclick="openEditModal(${u.id},'${escapeAttr(u.name)}','${escapeAttr(u.vatsim_cid||"")}','${escapeAttr(u.discord_id||"")}')">Edit</button>
              <button class="btn btn-danger" onclick="removeUser(${u.id},'${escapeAttr(u.name)}')">Remove</button>
            </div>
          </li>`;
        }).join("");
      } catch (err) {
        showError(err.message);
      }
    }

    async function addUser() {
      const name = document.getElementById("new-name").value.trim();
      const vatsimCid = document.getElementById("new-vatsim").value.trim();
      const discordId = document.getElementById("new-discord").value.trim();
      if (!name) { showError("Name is required"); return; }
      if (!vatsimCid && !discordId) { showError("At least one ID is required"); return; }
      if (vatsimCid && !/^\d+$/.test(vatsimCid)) { showError("VATSIM CID must be numeric"); return; }
      if (discordId && !/^\d+$/.test(discordId)) { showError("Discord ID must be numeric"); return; }
      try {
        await apiCall("POST", "/admin/users", { name, vatsimCid: vatsimCid || null, discordId: discordId || null });
        document.getElementById("new-name").value = "";
        document.getElementById("new-vatsim").value = "";
        document.getElementById("new-discord").value = "";
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    function openEditModal(id, name, vatsimCid, discordId) {
      document.getElementById("edit-user-id").value = id;
      document.getElementById("edit-name").value = name;
      document.getElementById("edit-vatsim").value = vatsimCid;
      document.getElementById("edit-discord").value = discordId;
      document.getElementById("edit-modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("edit-modal").style.display = "none";
    }

    async function saveUserEdit() {
      const id = parseInt(document.getElementById("edit-user-id").value);
      const name = document.getElementById("edit-name").value.trim();
      const vatsimCid = document.getElementById("edit-vatsim").value.trim();
      const discordId = document.getElementById("edit-discord").value.trim();
      if (!name) { showError("Name is required"); return; }
      if (vatsimCid && !/^\d+$/.test(vatsimCid)) { showError("VATSIM CID must be numeric"); return; }
      if (discordId && !/^\d+$/.test(discordId)) { showError("Discord ID must be numeric"); return; }
      try {
        await apiCall("PUT", "/admin/users", { id, name, vatsimCid: vatsimCid || "", discordId: discordId || "" });
        closeModal();
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    async function removeUser(id, name) {
      if (!confirm(`Remove uploader "${name}"?`)) return;
      try {
        await apiCall("DELETE", "/admin/users", { id });
        loadUsers();
      } catch (err) {
        showError(err.message);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return String(str || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;");
    }

    init();
  </script>
</body>
</html>
