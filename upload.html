<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Plugin · ActuallyLeviticus</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f6f8ff;
      --muted: #cfd6e1;
      --accent: #9bff46;
      --accent-2: #4ae0ff;
      --bg: #0a0e17;
      --card-bg: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --red: #ff5a5a;
      --green: #3fa63f;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Manrope", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .card p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: transform 100ms, filter 100ms;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active { transform: translateY(0); }
    .btn-vatsim { background: #29b473; color: #fff; }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06101b;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 480px;
      width: 100%;
      margin-bottom: 24px;
    }
    .topbar-user { color: var(--muted); font-size: 13px; }
    .logout-link {
      color: var(--muted); font-size: 13px; cursor: pointer;
      text-decoration: underline; background: none; border: none; font-family: inherit;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 40px 20px;
      margin-bottom: 20px;
      transition: border-color 200ms, background 200ms;
      cursor: pointer;
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(155, 255, 70, 0.04);
    }
    .drop-zone p { margin-bottom: 0; }
    .drop-zone .file-name {
      color: var(--accent);
      font-weight: 600;
      margin-top: 8px;
      word-break: break-all;
    }

    .error-banner {
      background: rgba(255,90,90,0.15);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .success-banner {
      background: rgba(63,166,63,0.15);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 3px;
      transition: width 200ms;
      width: 0%;
    }

    .allowed-types {
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <!-- Login view -->
  <div id="login-view" style="display:none">
    <h1>Plugin Upload</h1>
    <p class="subtitle">Sign in with VATSIM to upload your plugin</p>
    <div class="card">
      <p>Only authorized users can upload plugins. Contact the admin to request access.</p>
      <a class="btn btn-vatsim" href="https://api.actuallyleviticus.xyz/auth/vatsim">
        Sign in with VATSIM
      </a>
    </div>
  </div>

  <!-- Upload view -->
  <div id="upload-view" style="display:none">
    <div class="topbar">
      <div>
        <h1>Upload Plugin</h1>
      </div>
      <div style="text-align:right">
        <span class="topbar-user" id="uploader-name"></span><br>
        <button class="logout-link" onclick="logout()">Sign out</button>
      </div>
    </div>

    <div id="error-banner" class="error-banner" style="display:none"></div>
    <div id="success-banner" class="success-banner" style="display:none"></div>

    <div class="card">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <p>Drag & drop your plugin file here, or click to browse</p>
        <p class="file-name" id="file-name"></p>
        <input type="file" id="file-input" accept=".dll,.xml,.json,.zip" style="display:none">
      </div>
      <p class="allowed-types">Allowed types: .dll, .xml, .json, .zip — Max 50 MB</p>
      <div class="progress-bar" id="progress-bar" style="display:none">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <br>
      <button class="btn btn-accent" id="upload-btn" onclick="uploadFile()" disabled>Upload</button>
    </div>
  </div>

  <script>
    const API = "https://api.actuallyleviticus.xyz";
    let token = null;
    let selectedFile = null;

    function init() {
      const hash = window.location.hash;
      if (hash.startsWith("#token=")) {
        token = hash.slice(7);
        sessionStorage.setItem("uploadToken", token);
        history.replaceState(null, "", window.location.pathname);
      } else if (hash.startsWith("#error=")) {
        showError(decodeURIComponent(hash.slice(7)));
        history.replaceState(null, "", window.location.pathname);
      }

      if (!token) token = sessionStorage.getItem("uploadToken");

      if (token) {
        try {
          const payload = JSON.parse(atob(token));
          const data = JSON.parse(payload.data);
          document.getElementById("uploader-name").textContent = `${data.name} (${data.cid})`;
        } catch {}
        document.getElementById("upload-view").style.display = "block";
        setupDragDrop();
      } else {
        document.getElementById("login-view").style.display = "block";
      }
    }

    function logout() {
      sessionStorage.removeItem("uploadToken");
      token = null;
      document.getElementById("upload-view").style.display = "none";
      document.getElementById("login-view").style.display = "block";
    }

    function showError(msg) {
      const banner = document.getElementById("error-banner");
      banner.textContent = msg;
      banner.style.display = "block";
      document.getElementById("success-banner").style.display = "none";
      setTimeout(() => banner.style.display = "none", 6000);
    }

    function showSuccess(msg) {
      const banner = document.getElementById("success-banner");
      banner.textContent = msg;
      banner.style.display = "block";
      document.getElementById("error-banner").style.display = "none";
    }

    function setupDragDrop() {
      const zone = document.getElementById("drop-zone");
      const input = document.getElementById("file-input");

      zone.addEventListener("dragover", (e) => {
        e.preventDefault();
        zone.classList.add("drag-over");
      });
      zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
      zone.addEventListener("drop", (e) => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
      });
      input.addEventListener("change", () => {
        if (input.files.length) selectFile(input.files[0]);
      });
    }

    function selectFile(file) {
      const allowedExts = [".dll", ".xml", ".json", ".zip"];
      const ext = file.name.lastIndexOf(".") >= 0 ? file.name.slice(file.name.lastIndexOf(".")).toLowerCase() : "";
      if (!allowedExts.includes(ext)) {
        showError(`File type "${ext}" not allowed. Use: ${allowedExts.join(", ")}`);
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showError("File too large (max 50 MB)");
        return;
      }
      selectedFile = file;
      document.getElementById("file-name").textContent = file.name;
      document.getElementById("upload-btn").disabled = false;
    }

    async function uploadFile() {
      if (!selectedFile || !token) return;

      const btn = document.getElementById("upload-btn");
      const bar = document.getElementById("progress-bar");
      const fill = document.getElementById("progress-fill");

      btn.disabled = true;
      btn.textContent = "Uploading…";
      bar.style.display = "block";
      fill.style.width = "20%";

      try {
        const formData = new FormData();
        formData.append("file", selectedFile);

        const res = await fetch(`${API}/upload`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}` },
          body: formData,
        });

        fill.style.width = "100%";
        const data = await res.json();

        if (!res.ok) {
          if (res.status === 401) { logout(); showError("Session expired"); return; }
          throw new Error(data.error || "Upload failed");
        }

        showSuccess(`Uploaded successfully as "${data.key}"`);
        selectedFile = null;
        document.getElementById("file-name").textContent = "";
        document.getElementById("file-input").value = "";
        btn.textContent = "Upload";
      } catch (err) {
        showError(err.message);
        btn.textContent = "Upload";
        btn.disabled = false;
      } finally {
        setTimeout(() => {
          bar.style.display = "none";
          fill.style.width = "0%";
        }, 1500);
      }
    }

    init();
  </script>
</body>
</html>
