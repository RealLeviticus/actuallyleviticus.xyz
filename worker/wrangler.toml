name = "plugin-api"
main = "src/index.js"
compatibility_date = "2024-09-01"

routes = [
  { pattern = "api.actuallyleviticus.xyz/*", zone_name = "actuallyleviticus.xyz" }
]

[vars]
ADMIN_EMAIL = "therealleviticus@gmail.com"
SITE_ORIGIN = "https://actuallyleviticus.xyz"
# Set these as secrets via `wrangler secret put`:
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# VATSIM_CLIENT_ID
# VATSIM_CLIENT_SECRET

[[r2_buckets]]
binding = "PLUGINS_BUCKET"
bucket_name = "vatsys-plugins"

[[d1_databases]]
binding = "DB"
database_name = "plugin-users"
database_id = "511b3947-4721-4d9f-8bf8-16a670caf6ac"
